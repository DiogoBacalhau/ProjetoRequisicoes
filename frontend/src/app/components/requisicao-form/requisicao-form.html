<div style="padding: 20px; font-family: sans-serif; max-width: 600px; margin: 0 auto;">
    <h2>Nova Requisição de Recurso</h2>
    <p style="color: #6c757d; margin-bottom: 20px;">Preenche o formulário para solicitar a reserva de um ativo organizacional.</p>
  
    <div *ngIf="erroMensagem()" style="background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-weight: bold;">
      {{ erroMensagem() }}
    </div>
  
    <form (ngSubmit)="gravar()">
      <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Selecionar Recurso *</label>
        <select [(ngModel)]="requisicao.recurso_id" name="recurso_id" style="width: 100%; padding: 10px; border: 1px solid #dee2e6; border-radius: 4px; font-size: 16px; background-color: white;">
          <option *ngFor="let recurso of recursosDisponiveis()" [value]="recurso.id">
            [{{ recurso.tipo | uppercase }}] - {{ recurso.nome }}
          </option>
        </select>
        <small *ngIf="recursosDisponiveis().length === 0" style="color: #dc3545; display: block; margin-top: 5px;">
          Não existem recursos ativos disponíveis para reserva.
        </small>
      </div>
  
      <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Data/Hora de Início *</label>
        <input type="datetime-local" [(ngModel)]="requisicao.data_inicio" name="data_inicio" style="width: 100%; padding: 10px; border: 1px solid #dee2e6; border-radius: 4px; font-size: 16px;" required>
      </div>
  
      <div style="margin-bottom: 15px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Data/Hora de Fim *</label>
        <input type="datetime-local" [(ngModel)]="requisicao.data_fim" name="data_fim" style="width: 100%; padding: 10px; border: 1px solid #dee2e6; border-radius: 4px; font-size: 16px;" required>
      </div>
  
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">Observações / Justificação do Pedido</label>
        <textarea [(ngModel)]="requisicao.observacoes" name="observacoes" rows="4" placeholder="Explica brevemente a necessidade deste recurso..." style="width: 100%; padding: 10px; border: 1px solid #dee2e6; border-radius: 4px; font-size: 16px; font-family: sans-serif; resize: vertical;"></textarea>
      </div>
  
      <div style="display: flex; gap: 10px;">
        <button type="submit" [disabled]="recursosDisponiveis().length === 0" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;">
          Submeter Pedido
        </button>
        <a routerLink="/requisicoes" style="background-color: #6c757d; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 16px; text-align: center;">
          Cancelar
        </a>
      </div>
    </form>
  </div>
